name: Refresh SCA bundled data

# Auto-PR refresh of the bundled popular-package lists used by the
# typosquat detector. Per design/sca.md §940 + D2: weekly cron + manual
# trigger; opens a PR when upstream popularity sources have shifted, no-
# ops when they haven't.
#
# Sources hit (all unauthenticated):
#   - hugovk/top-pypi-packages (PyPI)
#   - anvaka/npmrank (npm)
#   - crates.io API (Cargo)
#   - packagist.org/explore/popular.json (Packagist)
#
# Other ecosystems (RubyGems, Maven, NuGet, Go, Homebrew, Debian) lack
# clean public popularity APIs and stay on hand-curated lists; future
# fetchers can land here without changing the workflow.

on:
  schedule:
    # Monday 06:00 UTC — quiet window for review on Monday morning.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

# Default GITHUB_TOKEN gets contents+PR write so create-pull-request
# can land the auto-PR. We keep the workflow's permissions block
# minimal — no other steps need write.
permissions:
  contents: write
  pull-requests: write

# A second cron firing while the previous run is still open shouldn't
# race. New runs supersede stale ones.
concurrency:
  group: refresh-sca-data
  cancel-in-progress: false

jobs:
  refresh:
    # These sources are public and deterministic — the lists are identical no
    # matter who runs the refresh, and forks consume the merged result from
    # upstream. So the weekly cron runs only on the canonical repo (otherwise
    # every active fork runs its own copy and fails at the PR step, since gh
    # defaults the base repo to the upstream parent on a fork). A fork that
    # wants fresh data without syncing can still trigger it manually via
    # workflow_dispatch; the gh commands below pin --repo so that lands a PR
    # on the fork itself.
    if: github.repository == 'gadievron/raptor' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # NOTE: action refs use floating tags below (`@v6`,
        # `@v7`). Per design/sca.md §1045, our own workflows should
        # hash-pin third-party actions; ``raptor-sca fix --cve-only
        # --hash-pin --hash-pin-write`` resolves these to commit SHAs.
        # Re-running it after each minor version bump is the
        # operator's job.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # was v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip==26.1.1
          # The refresh script needs urllib3 (core.http dependency)
          # but nothing else from requirements-dev — keep this fast.
          pip install 'urllib3==2.7.0,<3.0'

      - name: Run refresh
        # ``-v`` emits per-ecosystem ``updated/unchanged/skipped``
        # lines so the PR body can quote them verbatim. The script
        # exits 0 when at least one fetcher succeeded; a hard failure
        # surface here means EVERY upstream source is down — usually a
        # transient global event, retried at the next schedule.
        run: python -m packages.sca.refresh_typosquat_lists -v

      - name: Diff?
        # ``git diff --quiet`` exits non-zero when there are changes.
        # We capture that into an output so the PR step is conditional.
        id: diff
        run: |
          if git diff --quiet -- packages/sca/data/popular/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Typosquat candidate nudge
        if: steps.diff.outputs.changed == 'true'
        # Mechanical, LLM-FREE (CI has no LLM, and the data-refresh path must
        # not depend on one). Lists near-names that rode the refreshed feeds in
        # and are not yet classified — present in neither the denylist nor the
        # reviewed-legit list. Written to RUNNER_TEMP (never committed to the
        # repo) and appended to the PR body below as a triage nudge. The actual
        # judgement — fetch evidence, LLM-triage, gate — runs OPERATOR-side via
        # ``raptor-sca triage`` when reviewing this PR, where an LLM is
        # available. continue-on-error: a flaky popularity feed must surface the
        # data refresh, not redden it over an advisory nudge.
        continue-on-error: true
        run: |
          set -eu
          python -m packages.sca.supply_chain.typosquat_audit \
            --format markdown --out "$RUNNER_TEMP/typosquat-candidates.md"

      - name: Commit + push to refresh branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # No third-party PR-creation action — supply-chain hardening.
        # Uses git + ``gh`` CLI (GitHub-owned, pre-installed on
        # ubuntu-latest runners). Stable branch name + force-push
        # gives the same "weekly re-runs update the existing PR"
        # semantics as a third-party bot, with one fewer dependency.
        run: |
          set -eu
          BRANCH="auto/sca-data-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add packages/sca/data/popular/
          git commit -m "chore(sca): refresh bundled popular-package lists

          Auto-generated by .github/workflows/refresh-sca-data.yml.
          Sources: hugovk/top-pypi-packages, anvaka/npmrank,
          crates.io API, packagist.org/explore/popular.json."
          # Force-push so weekly re-runs update the same branch (and
          # therefore the same open PR). Safe: branch is namespaced
          # ``auto/`` and never touched by humans.
          # --force-with-lease (not --force): refuses the push if the
          # remote branch moved since our fetch — e.g. an operator amended
          # the open auto-PR — rather than clobbering it. Fetch first to
          # seed the lease baseline, but only when the branch already exists
          # remotely: a bare fetch of a missing ref prints a misleading
          # ``fatal: couldn't find remote ref`` on the first run (or after
          # the prior auto-PR branch was merged + deleted). When the guard
          # skips the fetch, the push simply creates the branch.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH" || true   # tolerate a transient blip
          fi
          git push --force-with-lease origin "$BRANCH"

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # ``gh`` is GitHub's first-party CLI, pre-installed on
        # ubuntu-latest runners. ``gh pr create`` exits non-zero
        # when a PR already exists for the branch — fall back to
        # ``gh pr edit`` to refresh the body.
        run: |
          set -eu
          BRANCH="auto/sca-data-refresh"
          BODY=$(cat <<'EOF'
          Auto-PR from `.github/workflows/refresh-sca-data.yml`.

          The bundled `packages/sca/data/popular/<eco>.json` lists drive `/sca`'s typosquat detector. Refreshed weekly so a newly-popular package becomes typosquat-detectable without waiting for a code release.

          **What changed:** see the diff. The refresh script is idempotent — when upstream is unchanged, no PR opens.

          **Reviewer checklist:**
          - The diff is additive or shifts ranking; new entries are real package names (no garbage).
          - No ecosystem suddenly emptied (would silently disarm the detector).
          - Tests pass.
          EOF
          )
          # Append the typosquat candidate nudge if the audit produced one.
          # The file lives in RUNNER_TEMP (not the repo); empty = no candidates.
          CAND="$RUNNER_TEMP/typosquat-candidates.md"
          if [ -s "$CAND" ]; then
            BODY="$BODY"$'\n\n---\n\n'"$(cat "$CAND")"
          fi
          # --repo pins the running repo: without it gh defaults the base
          # repo to the upstream parent on a fork, so a manual fork run would
          # target (and fail against) the parent instead of the fork.
          if ! gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base main \
                --head "$BRANCH" \
                --title "chore(sca): refresh bundled popular-package lists" \
                --body "$BODY" 2>/dev/null; then
            gh pr edit --repo "$GITHUB_REPOSITORY" "$BRANCH" --body "$BODY"
          fi
          # Labels best-effort (see sca-self-bump): a missing label must
          # never block the PR. Create them once under Settings → Labels.
          for lbl in automated sca data-refresh; do
            gh pr edit --repo "$GITHUB_REPOSITORY" "$BRANCH" --add-label "$lbl" 2>/dev/null \
              || echo "label '$lbl' not in repo; skipping (create it under Settings → Labels to auto-apply)"
          done
