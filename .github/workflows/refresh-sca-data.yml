name: Refresh SCA bundled data

# Auto-PR refresh of the bundled popular-package lists used by the
# typosquat detector. Per design/sca.md §940 + D2: weekly cron + manual
# trigger; opens a PR when upstream popularity sources have shifted, no-
# ops when they haven't.
#
# Sources hit (all unauthenticated):
#   - hugovk/top-pypi-packages (PyPI)
#   - anvaka/npmrank (npm)
#   - crates.io API (Cargo)
#   - packagist.org/explore/popular.json (Packagist)
#
# Other ecosystems (RubyGems, Maven, NuGet, Go, Homebrew, Debian) lack
# clean public popularity APIs and stay on hand-curated lists; future
# fetchers can land here without changing the workflow.

on:
  schedule:
    # Monday 06:00 UTC — quiet window for review on Monday morning.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

# Default GITHUB_TOKEN gets contents+PR write so create-pull-request
# can land the auto-PR. We keep the workflow's permissions block
# minimal — no other steps need write.
permissions:
  contents: write
  pull-requests: write

# A second cron firing while the previous run is still open shouldn't
# race. New runs supersede stale ones.
concurrency:
  group: refresh-sca-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # NOTE: action refs use floating tags below (`@v6`,
        # `@v7`). Per design/sca.md §1045, our own workflows should
        # hash-pin third-party actions; ``raptor-sca fix --cve-only
        # --hash-pin --hash-pin-write`` resolves these to commit SHAs.
        # Re-running it after each minor version bump is the
        # operator's job.
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          # The refresh script needs urllib3 (core.http dependency)
          # but nothing else from requirements-dev — keep this fast.
          pip install 'urllib3>=2.0,<3.0'

      - name: Run refresh
        # ``-v`` emits per-ecosystem ``updated/unchanged/skipped``
        # lines so the PR body can quote them verbatim. The script
        # exits 0 when at least one fetcher succeeded; a hard failure
        # surface here means EVERY upstream source is down — usually a
        # transient global event, retried at the next schedule.
        run: python -m packages.sca.refresh_typosquat_lists -v

      - name: Diff?
        # ``git diff --quiet`` exits non-zero when there are changes.
        # We capture that into an output so the PR step is conditional.
        id: diff
        run: |
          if git diff --quiet -- packages/sca/data/popular/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # Stable branch name so re-runs update the existing PR rather
          # than open a fresh one each week.
          branch: auto/sca-data-refresh
          base: main
          title: 'chore(sca): refresh bundled popular-package lists'
          commit-message: |
            chore(sca): refresh bundled popular-package lists

            Auto-generated by .github/workflows/refresh-sca-data.yml.
            Sources: hugovk/top-pypi-packages, anvaka/npmrank,
            crates.io API, packagist.org/explore/popular.json.
          body: |
            Auto-PR from `.github/workflows/refresh-sca-data.yml`.

            The bundled `packages/sca/data/popular/<eco>.json` lists
            drive `/sca`'s typosquat detector. Refreshed weekly so a
            newly-popular package becomes typosquat-detectable
            without waiting for a code release.

            **What changed:** see the diff. The refresh script is
            idempotent — when upstream is unchanged, no PR opens.

            **Reviewer checklist:**
            - The diff is additive or shifts ranking; new entries
              are real package names (no garbage).
            - No ecosystem suddenly emptied (would silently disarm
              the detector).
            - Tests pass.
          labels: |
            sca
            data-refresh
            automated
          # Sign the commit as the GitHub Actions bot rather than the
          # workflow runner's default identity.
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
