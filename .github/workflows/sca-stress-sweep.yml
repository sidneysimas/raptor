name: SCA stress sweep

# Regression-detection sweep that scans every sample in
# ``PROJECT_SAMPLES`` and diffs scan diagnostics (deps_analysed /
# vuln_findings / per-finding eco breakdown / elapsed) against
# the committed baseline at
# ``packages/sca/data/calibration/stress_baseline.json``.
#
# Catches the silent-regression class of bug — the canonical
# example was the OSV ``Cargo → crates.io`` ecosystem-name
# mismatch that quietly zeroed every Rust CVE lookup. Validation
# + refit metrics still passed because Cargo signal density was
# already 0%, but the stress sweep would have flagged
# ``alacritty-0.13 vuln_findings 6 → 0 (-100%)``.
#
# Runs on:
#   - manual dispatch (workflow_dispatch) — operator triggers
#     when investigating
#   - weekly cron (Monday 04:00 UTC) — catches drift from
#     external service shifts (registry data, OSV updates)
#
# Network: hits OSV / KEV / EPSS / multiple package registries
# / OCI registries. Per-host circuit breaker bounds 429 cascades
# but the sweep is still ~6-10 min wallclock against fresh
# caches.

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

# A new push or cron firing while a previous run is in-flight
# supersedes it — the most-recent state is the one that matters.
concurrency:
  group: sca-stress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # was v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install runtime deps
        # ``raptor-sca`` needs the full runtime requirements; the
        # sweep then drives the actual scanner against each sample.
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip==26.1.1
          pip install -r requirements.txt

      - name: Run stress sweep
        # The trust-marker is required by libexec/* scripts; we set
        # it for the runner since CI is the trusted-caller analogue
        # of the operator's CLI.
        env:
          _RAPTOR_TRUSTED: '1'
        # Drives the full sweep and prints per-project
        # results + the diff vs the committed baseline. Exit 0 = ok,
        # 1 = warn (small drift), 2 = fail (large drift or scan
        # error). The non-zero exit fails the workflow check, which
        # is what we want for a regression gate.
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys
          sys.path.insert(0, '.')
          from pathlib import Path
          from packages.sca.calibration.project_samples import PROJECT_SAMPLES
          from packages.sca.calibration.stress import (
              compare_to_baseline, diffs_to_exit_code, render_diffs,
              run_stress_sweep,
          )

          import logging
          logging.basicConfig(
              level=logging.INFO, format="%(message)s",
          )
          print(f"running {len(PROJECT_SAMPLES)} samples...", flush=True)
          results = run_stress_sweep(
              samples=PROJECT_SAMPLES,
              git_clone_timeout=300,
              sca_timeout=600,
              max_workers=4,
          )
          baseline = Path(
              "packages/sca/data/calibration/stress_baseline.json"
          )
          diffs = compare_to_baseline(results, baseline)
          print(render_diffs(diffs))
          rc = diffs_to_exit_code(diffs)
          import os
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              with open(summary_path, "a") as f:
                  f.write("## SCA Stress Sweep\n\n```\n")
                  f.write(render_diffs(diffs))
                  f.write("\n```\n")
          sys.exit(rc)
          PY

      - name: Upload sweep artefacts
        # Always run — failed sweeps + drift reports are exactly
        # what operators want to inspect. The scan output dirs
        # live under the stress-clones cache root and are too big
        # for an artefact; just the per-sample summary table goes.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sca-stress-sweep-${{ github.run_id }}
          path: |
            ~/.raptor/cache/sca/stress/clones/*/out/findings.json
            ~/.raptor/cache/sca/stress/clones/*/out/report.md
          retention-days: 14
          if-no-files-found: warn
