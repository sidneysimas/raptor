name: Refresh SCA project samples

# Auto-PR refresh of the calibration corpus's project-sample
# scans. For each curated OSS project in
# ``packages/sca/calibration/project_samples.py::PROJECT_SAMPLES``,
# the workflow:
#
#   1. Shallow-clones the project (transient — never stored).
#   2. Runs raptor-sca against it.
#   3. Sanitises findings (file paths under the discarded clone
#      tree are stripped).
#   4. Writes the result to
#      ``packages/sca/data/calibration/project_samples/<eco>/<name>.json``.
#
# The scan output is RAPTOR-generated and ships under MIT;
# project source itself is never redistributed.
#
# Cadence: monthly. Project deps don't shift weekly, and cloning
# + scanning ten OSS projects is more expensive than the daily
# KEV / EPSS refresh; monthly keeps the corpus current without
# burning CI minutes.

on:
  schedule:
    # 1st of each month, 06:00 UTC.
    - cron: '0 6 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-sca-project-samples
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # Higher than the daily refreshes — cloning + scanning ten
    # projects can run 30-60 minutes on a cold cache.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # was v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==26.1.1
          # Full SCA dep set — the collector runs the SCA pipeline
          # against each cloned project, so it needs everything
          # SCA needs (urllib3 plus parsers' dependencies).
          pip install -r requirements.txt

      - name: Collect samples
        # ``-v`` emits per-sample status lines so the PR body can
        # quote them. Exits 0 when all samples succeeded; 1 when at
        # least one failed (others may still have written). Either
        # way we proceed to the diff/PR step — partial refresh is
        # better than no refresh.
        run: |
          set +e
          packages/sca/scripts/raptor-sca-collect-samples -v
          # Don't propagate the per-sample exit code — partial
          # success still produces a useful diff.
          true

      - name: License-compliance check
        # Same gate the calibration-corpus refresh uses — verifies
        # no forbidden field names (``shellcode``, ``payload``,
        # etc.) appear in any sample output. Defensive against a
        # scanned project producing finding metadata that happens
        # to match the forbidden-field heuristic.
        run: python -m packages.sca.calibration._license_check

      - name: Validate corpus
        # Re-run validation since project samples just refreshed.
        # Top-N precision + Spearman ρ depend on the per-project
        # finding sets being current. Verdict (validated_v1 /
        # unverified / needs_retune) lands in the same auto-PR.
        run: |
          set +e
          packages/sca/scripts/raptor-sca-validate-corpus
          echo "validate exit: $?"

      - name: Diff?
        id: diff
        run: |
          # Diff the project_samples subtree AND the validation
          # subtree — both can change in this run.
          if git diff --quiet -- \
              packages/sca/data/calibration/project_samples/ \
              packages/sca/data/calibration/validation/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push to refresh branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          BRANCH="auto/sca-project-samples-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add packages/sca/data/calibration/project_samples/ \
                  packages/sca/data/calibration/validation/
          git commit -m "chore(sca): refresh calibration project samples

          Auto-generated by .github/workflows/refresh-sca-project-samples.yml.
          Each sample is the OUR-generated output of running raptor-sca
          against a curated OSS project; project source is not
          redistributed. See packages/sca/data/calibration/ATTRIBUTION.md
          for the project list and licensing posture."
          git push --force origin "$BRANCH"

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          BRANCH="auto/sca-project-samples-refresh"
          BODY=$(cat <<'EOF'
          Auto-PR from `.github/workflows/refresh-sca-project-samples.yml`.

          Refreshes the calibration corpus's project-sample scans.
          Each sample is RAPTOR-generated SCA output against a
          curated OSS project — project source itself is never
          redistributed.

          ## Per-sample status

          See the workflow run log for the per-sample
          `raptor-sca-collect-samples: <eco>/<name> ok (N findings)`
          output.

          ## License compliance

          The license-compliance check runs in CI and rejects any
          file with forbidden field names (`body`, `payload`,
          `shellcode`, `exploit_code`, `poc_code`). Project samples
          ship under MIT (RAPTOR-generated output).

          ## Why this matters

          The accumulated samples are what the calibration
          validation function (`raptor-sca-validate-corpus`) uses
          to compute top-N precision and Spearman correlation
          against the ground-truth signals. Until ~6 months of
          weekly snapshots accumulate, validation will report
          `unverified`; this PR is one of the monthly steps
          toward `validated_v1`.

          ## Review checklist

          - [ ] Per-sample finding counts look reasonable
          - [ ] No license-restricted content in the diff
          - [ ] Tests pass
          EOF
          )
          if ! gh pr create \
                --base main \
                --head "$BRANCH" \
                --title "chore(sca): refresh calibration project samples" \
                --body "$BODY" \
                --label sca \
                --label data-refresh \
                --label automated 2>/dev/null; then
            gh pr edit "$BRANCH" --body "$BODY"
          fi
