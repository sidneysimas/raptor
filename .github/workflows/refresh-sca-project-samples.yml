name: Refresh SCA project samples

# Auto-PR refresh of the calibration corpus's project-sample
# scans. For each curated OSS project in
# ``packages/sca/calibration/project_samples.py::PROJECT_SAMPLES``,
# the workflow:
#
#   1. Shallow-clones the project (transient — never stored).
#   2. Runs raptor-sca against it.
#   3. Sanitises findings (file paths under the discarded clone
#      tree are stripped).
#   4. Writes the result to
#      ``packages/sca/data/calibration/project_samples/<eco>/<name>.json``.
#
# The scan output is RAPTOR-generated and ships under MIT;
# project source itself is never redistributed.
#
# Cadence: monthly. Project deps don't shift weekly, and cloning
# + scanning ten OSS projects is more expensive than the daily
# KEV / EPSS refresh; monthly keeps the corpus current without
# burning CI minutes.

on:
  schedule:
    # 1st of each month, 06:00 UTC.
    - cron: '0 6 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-sca-project-samples
  cancel-in-progress: false

jobs:
  collect:
    # Deterministic refresh from public sources — identical for any runner,
    # and forks consume the merged result from upstream. So the cron runs only
    # on the canonical repo (otherwise every active fork runs its own copy and
    # fails at the PR step, since gh defaults the base repo to the upstream
    # parent on a fork). A fork can still refresh on demand via
    # workflow_dispatch; the gh commands pin --repo so the PR lands on the
    # fork itself.
    if: github.repository == 'gadievron/raptor' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Higher than the daily refreshes — cloning + scanning the corpus is
    # the heaviest job. The collector now scans projects in parallel
    # (``--jobs``), which cut a sequential ~20-min run to a few minutes;
    # the headroom stays for cold caches and corpus growth.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # was v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip==26.1.1
          # Full SCA dep set — the collector runs the SCA pipeline
          # against each cloned project, so it needs everything
          # SCA needs (urllib3 plus parsers' dependencies).
          pip install -r requirements.txt

      - name: Collect samples
        # ``-v`` emits per-sample status lines so the PR body can
        # quote them. Exits 0 when all samples succeeded; 1 when at
        # least one failed (others may still have written). Either
        # way we proceed to the diff/PR step — partial refresh is
        # better than no refresh.
        run: |
          set +e
          # ``--jobs 4`` matches the ubuntu-latest vCPU count. Each project
          # scans in its own process (full isolation; the egress proxy binds
          # an ephemeral per-process port) and they share the on-disk cache.
          packages/sca/scripts/raptor-sca-collect-samples -v --jobs 4
          # Don't propagate the per-sample exit code — partial
          # success still produces a useful diff.
          true

      - name: License-compliance check
        # Same gate the calibration-corpus refresh uses — verifies
        # no forbidden field names (``shellcode``, ``payload``,
        # etc.) appear in any sample output. Defensive against a
        # scanned project producing finding metadata that happens
        # to match the forbidden-field heuristic.
        run: python -m packages.sca.calibration._license_check

      - name: Validate corpus
        # Re-run validation since project samples just refreshed.
        # Top-N precision + Spearman ρ depend on the per-project
        # finding sets being current. Verdict (validated_v1 /
        # unverified / needs_retune) lands in the same auto-PR.
        run: |
          set +e
          packages/sca/scripts/raptor-sca-validate-corpus
          echo "validate exit: $?"

      - name: Diff?
        id: diff
        run: |
          # Diff the project_samples subtree AND the validation
          # subtree — both can change in this run.
          if git diff --quiet -- \
              packages/sca/data/calibration/project_samples/ \
              packages/sca/data/calibration/validation/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push to refresh branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          BRANCH="auto/sca-project-samples-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add packages/sca/data/calibration/project_samples/ \
                  packages/sca/data/calibration/validation/
          git commit -m "chore(sca): refresh calibration project samples

          Auto-generated by .github/workflows/refresh-sca-project-samples.yml.
          Each sample is the OUR-generated output of running raptor-sca
          against a curated OSS project; project source is not
          redistributed. See packages/sca/data/calibration/ATTRIBUTION.md
          for the project list and licensing posture."
          # --force-with-lease (not --force): refuses the push if the
          # remote branch moved since our fetch — e.g. an operator amended
          # the open auto-PR — rather than clobbering it. Fetch first to
          # seed the lease baseline, but only when the branch already exists
          # remotely: a bare fetch of a missing ref prints a misleading
          # ``fatal: couldn't find remote ref`` on the first run (or after
          # the prior auto-PR branch was merged + deleted). When the guard
          # skips the fetch, the push simply creates the branch.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH" || true   # tolerate a transient blip
          fi
          git push --force-with-lease origin "$BRANCH"

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          BRANCH="auto/sca-project-samples-refresh"
          BODY=$(cat <<'EOF'
          Auto-PR from `.github/workflows/refresh-sca-project-samples.yml`.

          Refreshes the calibration corpus's project-sample scans. Each sample is RAPTOR-generated SCA output against a curated OSS project — project source itself is never redistributed.

          ## Per-sample status

          See the workflow run log for the per-sample `raptor-sca-collect-samples: <eco>/<name> ok (N findings)` output.

          ## License compliance

          The license-compliance check runs in CI and rejects any file with forbidden field names (`body`, `payload`, `shellcode`, `exploit_code`, `poc_code`). Project samples ship under MIT (RAPTOR-generated output).

          ## Why this matters

          The accumulated samples are what the calibration validation function (`raptor-sca-validate-corpus`) uses to compute top-N precision and Spearman correlation against the ground-truth signals. Until ~6 months of weekly snapshots accumulate, validation will report `unverified`; this PR is one of the monthly steps toward `validated_v1`.

          ## Review checklist

          - [ ] Per-sample finding counts look reasonable
          - [ ] No license-restricted content in the diff
          - [ ] Tests pass
          EOF
          )
          # --repo pins the running repo: without it gh defaults the base
          # repo to the upstream parent on a fork, so a manual fork run would
          # target (and fail against) the parent instead of the fork.
          if ! gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base main \
                --head "$BRANCH" \
                --title "chore(sca): refresh calibration project samples" \
                --body "$BODY" 2>/dev/null; then
            gh pr edit --repo "$GITHUB_REPOSITORY" "$BRANCH" --body "$BODY"
          fi
          # Labels best-effort (see sca-self-bump): a missing label must
          # never block the PR. Create them once under Settings → Labels.
          for lbl in automated sca data-refresh; do
            gh pr edit --repo "$GITHUB_REPOSITORY" "$BRANCH" --add-label "$lbl" 2>/dev/null \
              || echo "label '$lbl' not in repo; skipping (create it under Settings → Labels to auto-apply)"
          done
