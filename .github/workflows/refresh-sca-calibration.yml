name: Refresh SCA calibration corpus

# Auto-PR refresh of the calibration corpus under
# ``packages/sca/data/calibration/``. Pulls public ground-truth
# signals (CISA KEV, FIRST EPSS, etc.) and opens a PR when any
# source has shifted; no-ops when the corpus is current.
#
# Sources hit (all unauthenticated, MIT-redistribution-compatible):
#   - cisa.gov KEV feed (Public Domain)
#   - api.first.org EPSS feed (free for any use)
#
# See ``packages/sca/data/calibration/ATTRIBUTION.md`` for the full
# source list and licensing.
#
# Tier 2 sources (Exploit-DB / Metasploit) ship as boolean-signal
# only and are added incrementally as their fetchers land in
# ``packages/sca/calibration/``.

on:
  schedule:
    # Tuesday 06:00 UTC — staggered from the popular-package refresh
    # workflow (Mondays) to spread out review load.
    - cron: '0 6 * * 2'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

# Don't race when a previous scheduled run is still open / its PR
# is still pending review.
concurrency:
  group: refresh-sca-calibration
  cancel-in-progress: false

jobs:
  refresh:
    # Public, deterministic sources (KEV / EPSS) — the corpus is identical no
    # matter who runs it, and forks consume the merged result from upstream.
    # So the cron runs only on the canonical repo (otherwise every active fork
    # runs its own copy and fails at the PR step, since gh defaults the base
    # repo to the upstream parent on a fork). A fork can still refresh on
    # demand via workflow_dispatch; the gh commands pin --repo so the PR lands
    # on the fork itself.
    if: github.repository == 'gadievron/raptor' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # was v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # was v6
        with:
          python-version: '3.12'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip==26.1.1
          # The build script needs only urllib3 (the core.http
          # backend). The validate step runs on the stdlib + the
          # bundled corpus — no pytest required. Keep this fast.
          pip install 'urllib3==2.7.0,<3.0'

      - name: Refresh corpus
        # ``-v`` emits per-source ``updated/unchanged`` (and
        # ``FAILED``) lines; we capture them to refresh.log and embed
        # them in the PR body so a drifted source shows up in review.
        # Exit 0 = at least one source produced output; exit 1 = every
        # source failed (a global outage, retried next schedule). A
        # single source drifting does NOT fail the run or discard the
        # rest. (GHA's default shell sets pipefail, so the script's
        # exit code propagates through the ``tee``.)
        run: |
          # Log to $RUNNER_TEMP (persists across steps, outside the
          # worktree) so it can't be swept into the commit if the scoped
          # ``git add`` below is ever broadened, and never dirties the tree.
          packages/sca/scripts/raptor-sca-build-corpus -v 2>&1 \
            | tee "$RUNNER_TEMP/refresh.log"

      - name: License-compliance check
        # Defence in depth: enforces the ATTRIBUTION.md cross-
        # reference + rejects any forbidden ``body`` /
        # ``shellcode`` / ``exploit_code`` fields that would mean
        # license-restricted content snuck in. Pre-commit hook +
        # CI = both gates.
        run: python -m packages.sca.calibration._license_check

      - name: Validate corpus
        # Run the validation harness against the freshly-refreshed
        # corpus. Emits ``packages/sca/data/calibration/validation/
        # <date>.json`` with top-N precision + Spearman ρ + verdict.
        # The verdict (validated_v1 / unverified / needs_retune)
        # gets read at runtime by risk.py to set the
        # ``calibration_status`` field on each finding's risk
        # components.
        #
        # Exit codes are informational here — the script returns 1
        # when the corpus is below thresholds OR when there aren't
        # enough samples yet for a verdict. Either way we want the
        # PR to land carrying the report, so we don't gate on the
        # exit. Operators read the report directly.
        run: |
          set +e
          packages/sca/scripts/raptor-sca-validate-corpus
          echo "validate exit: $?"

      - name: Diff?
        # ``git diff --quiet`` exits non-zero iff there are changes
        # under the calibration data dir (which now includes the
        # validation report subtree).
        id: diff
        run: |
          if git diff --quiet -- packages/sca/data/calibration/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push to refresh branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # No third-party PR-creation action — supply-chain hardening.
        # Uses git + ``gh`` CLI (GitHub-owned, pre-installed on
        # ubuntu-latest runners). Stable branch name + force-push
        # gives the same "weekly re-runs update the existing PR"
        # semantics as a third-party bot, with one fewer dependency.
        run: |
          set -eu
          BRANCH="auto/sca-calibration-refresh"
          # Configure the bot identity. Using the GitHub-Actions
          # service account so the auto-commit is clearly machine-
          # generated; per-step ``GITHUB_TOKEN`` carries
          # ``contents:write`` per the workflow's permissions block.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Commit only the calibration data dir — no stray
          # workspace files. ``--allow-empty=false`` makes the
          # ``git diff --quiet`` gate above the source of truth.
          git checkout -B "$BRANCH"
          git add packages/sca/data/calibration/
          git commit -m "chore(sca): refresh calibration corpus

          Auto-generated by .github/workflows/refresh-sca-calibration.yml.
          Sources: CISA KEV (Public Domain), FIRST EPSS (free for any use).
          See packages/sca/data/calibration/ATTRIBUTION.md for the full
          source list and licensing."
          # Force-push so weekly re-runs update the same branch (and
          # therefore the same open PR). Safe: branch is namespaced
          # ``auto/`` and never touched by humans.
          # --force-with-lease (not --force): refuses the push if the
          # remote branch moved since our fetch — e.g. an operator amended
          # the open auto-PR — rather than clobbering it. Fetch first to
          # seed the lease baseline, but only when the branch already exists
          # remotely: a bare fetch of a missing ref prints a misleading
          # ``fatal: couldn't find remote ref`` on the first run (or after
          # the prior auto-PR branch was merged + deleted). When the guard
          # skips the fetch, the push simply creates the branch.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "$BRANCH" || true   # tolerate a transient blip
          fi
          git push --force-with-lease origin "$BRANCH"

      - name: Create or update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # ``gh`` is GitHub's first-party CLI, pre-installed on
        # ubuntu-latest runners. ``gh pr create`` no-ops when a PR
        # already exists for the branch — we then fall through to
        # ``gh pr edit`` to refresh the body.
        run: |
          set -eu
          BRANCH="auto/sca-calibration-refresh"
          # Build the PR body, embedding the captured per-source
          # status (incl. any FAILED sources) so a drifted upstream
          # shows up in review rather than only in the run log.
          {
            cat <<'EOF'
          Auto-PR from `.github/workflows/refresh-sca-calibration.yml`.

          Refreshes the bundled `packages/sca/data/calibration/` ground-truth signals used to validate the `raptor_risk_estimate` weights in `packages/sca/risk.py`.

          ## Per-source status

          EOF
            echo '```'
            cat "$RUNNER_TEMP/refresh.log" 2>/dev/null || echo '(per-source status unavailable)'
            echo '```'
            cat <<'EOF'

          ## License compliance

          All Tier 1 sources (KEV, EPSS) are MIT-redistribution compatible and ship verbatim with per-file `_source` attribution blocks. The license-compliance check runs in CI and rejects any forbidden field names that would indicate license-restricted content.

          ## Review checklist

          - [ ] Per-source counts look reasonable (≥ prior run)
          - [ ] No source shows FAILED above (or it's a known transient)
          - [ ] No license-restricted content in the diff
          - [ ] `ATTRIBUTION.md` still covers every JSON file
          EOF
          } > "$RUNNER_TEMP/pr-body.md"
          # Idempotent create-or-update: ``gh pr create`` exits non-zero
          # when a PR for the branch already exists — fall through to
          # ``gh pr edit`` to refresh the body. (Labels applied below.)
          # --repo pins the running repo: without it gh defaults the base
          # repo to the upstream parent on a fork, so a manual fork run would
          # target (and fail against) the parent instead of the fork.
          if ! gh pr create \
                --repo "$GITHUB_REPOSITORY" \
                --base main \
                --head "$BRANCH" \
                --title "chore(sca): refresh calibration corpus" \
                --body-file "$RUNNER_TEMP/pr-body.md" 2>/dev/null; then
            gh pr edit --repo "$GITHUB_REPOSITORY" "$BRANCH" --body-file "$RUNNER_TEMP/pr-body.md"
          fi
          # Labels best-effort (see sca-self-bump): pull-requests:write
          # applies EXISTING labels but can't create them, and
          # ``gh pr create --label`` hard-errors on an unknown label
          # (which killed this step in run #3). Create the canonical
          # labels once under Settings → Labels to auto-apply them.
          for lbl in automated sca data-refresh; do
            gh pr edit --repo "$GITHUB_REPOSITORY" "$BRANCH" --add-label "$lbl" 2>/dev/null \
              || echo "label '$lbl' not in repo; skipping (create it under Settings → Labels to auto-apply)"
          done
